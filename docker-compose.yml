services:
  browser:
    build: .
    container_name: browser
    restart: unless-stopped
    ports:
      - "8080:8080"   # API + UI + nginx-proxied VNC/CDP
      - "6080:6080"   # VNC WebSocket (direct)
      - "9222:9223"   # CDP (socat relay; Chrome listens on localhost:9222)
    environment:
      - START_CHROME=false  # Chrome started by session API
    volumes:
      - ./recordings:/app/recordings
      - ./sessions:/app/sessions
      - ./profiles:/app/profiles
    shm_size: 2g  # Required for Chrome
    security_opt:
      - seccomp:unconfined  # Required for Chrome
