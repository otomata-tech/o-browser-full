# Unified routing for browser container
# Unified routing: API, VNC, CDP all on port 8080

worker_processes 1;
daemon off;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;

    # WebSocket upgrade mapping (required for proper WS handling)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 8080;

        # API server
        location /api/ {
            proxy_pass http://127.0.0.1:3080/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Health endpoint (no /api prefix)
        location = /health {
            proxy_pass http://127.0.0.1:3080/health;
        }

        # VNC WebSocket endpoint (websockify) - accessed by noVNC from /vnc/vnc.html
        location /vnc/websockify {
            proxy_pass http://127.0.0.1:6080/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400;
        }

        # VNC WebSocket at root (noVNC default path)
        location = /websockify {
            proxy_pass http://127.0.0.1:6080/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400;
        }

        # VNC static files
        location /vnc/ {
            proxy_pass http://127.0.0.1:6080/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # CDP WebSocket
        location /cdp/ {
            proxy_pass http://127.0.0.1:9222/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        # Static UI
        location / {
            root /app/ui;
            try_files $uri $uri/ /index.html;
        }
    }
}
